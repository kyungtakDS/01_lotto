<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또번호 추첨기</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --text-color: #172033;
      --sub-text-color: #59677c;
      --muted-color: #6b7280;
      --bg-glow: rgba(255, 215, 87, 0.38);
      --bg-grad-start: #f7f9fc;
      --bg-grad-end: #eaf0f8;
      --button-bg: #ffd447;
      --button-bg-hover: #ffc928;
      --button-text: #111827;
      --card-bg: rgba(255, 255, 255, 0.86);
      --card-border: rgba(120, 135, 160, 0.22);
      --card-shadow: rgba(28, 42, 70, 0.08);
      --game-title-color: #2f3c52;
      --empty-border: #aeb8c8;
      --empty-bg: rgba(255, 255, 255, 0.58);
      --empty-text: #68758a;
    }

    html[data-theme="dark"] {
      --text-color: #e8edf7;
      --sub-text-color: #aab4c6;
      --muted-color: #9aa4b8;
      --bg-glow: rgba(255, 215, 87, 0.14);
      --bg-grad-start: #161b27;
      --bg-grad-end: #0c1018;
      --button-bg: #ffd447;
      --button-bg-hover: #ffc928;
      --button-text: #111827;
      --card-bg: rgba(255, 255, 255, 0.06);
      --card-border: rgba(255, 255, 255, 0.12);
      --card-shadow: rgba(0, 0, 0, 0.35);
      --game-title-color: #e8edf7;
      --empty-border: rgba(255, 255, 255, 0.25);
      --empty-bg: rgba(255, 255, 255, 0.04);
      --empty-text: #9aa4b8;
    }

    body {
      min-height: 100vh;
      font-family: Arial, "Noto Sans KR", sans-serif;
      color: var(--text-color);
      background:
        radial-gradient(circle at top left, var(--bg-glow), transparent 28rem),
        linear-gradient(135deg, var(--bg-grad-start) 0%, var(--bg-grad-end) 100%);
      transition: background 0.2s ease, color 0.2s ease;
    }

    main {
      width: min(960px, calc(100% - 32px));
      margin: 0 auto;
      padding: 56px 0;
    }

    .app-header {
      display: grid;
      gap: 18px;
      margin-bottom: 34px;
    }

    h1 {
      font-size: clamp(2.25rem, 7vw, 4.8rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .sub-text {
      max-width: 620px;
      color: var(--sub-text-color);
      font-size: 1.05rem;
      line-height: 1.7;
    }

    .control-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin: 30px 0 22px;
    }

    button {
      min-height: 48px;
      border: 0;
      border-radius: 8px;
      padding: 0 20px;
      font-size: 1rem;
      font-weight: 700;
      color: var(--button-text);
      background: var(--button-bg);
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(182, 129, 0, 0.18);
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    button:hover {
      background: var(--button-bg-hover);
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(182, 129, 0, 0.22);
    }

    button:active {
      transform: translateY(0);
    }

    .theme-toggle {
      background: transparent;
      color: var(--text-color);
      border: 1px solid var(--card-border);
      box-shadow: none;
    }

    .theme-toggle:hover {
      background: var(--card-bg);
      box-shadow: none;
    }

    .muted {
      color: var(--muted-color);
      font-size: 0.95rem;
    }

    .result-list {
      display: grid;
      gap: 14px;
      list-style: none;
    }

    .game-card {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 18px;
      align-items: center;
      min-height: 98px;
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 18px;
      background: var(--card-bg);
      box-shadow: 0 10px 28px var(--card-shadow);
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .game-title {
      color: var(--game-title-color);
      font-weight: 800;
    }

    .numbers {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .ball {
      display: inline-grid;
      place-items: center;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      color: #111827;
      font-weight: 800;
      box-shadow: inset 0 -4px 10px rgba(0, 0, 0, 0.12), 0 5px 12px rgba(31, 41, 55, 0.14);
    }

    .ball-yellow {
      background: #f7c948;
    }

    .ball-blue {
      color: white;
      background: #3b82f6;
    }

    .ball-red {
      color: white;
      background: #ef4444;
    }

    .ball-gray {
      color: white;
      background: #64748b;
    }

    .ball-green {
      color: white;
      background: #22a06b;
    }

    .plus {
      color: #9aa4b2;
      font-weight: 800;
    }

    .bonus {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      margin-left: 2px;
    }

    .bonus-label {
      color: var(--muted-color);
      font-size: 0.85rem;
      font-weight: 700;
    }

    .empty-state {
      border: 1px dashed var(--empty-border);
      border-radius: 8px;
      padding: 36px 20px;
      color: var(--empty-text);
      background: var(--empty-bg);
      text-align: center;
    }

    @media (max-width: 640px) {
      main {
        width: min(100% - 24px, 960px);
        padding: 34px 0;
      }

      .game-card {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .ball {
        width: 40px;
        height: 40px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header class="app-header">
      <h1>로또번호 추첨기</h1>
      <p class="sub-text">
        버튼을 누르면 1부터 45까지의 숫자 중 중복 없이 6개 번호를 뽑습니다.
        한 번에 2게임을 추천하고, 각 게임마다 보너스 번호도 함께 표시합니다.
      </p>
    </header>

    <section aria-labelledby="draw-title">
      <h2 id="draw-title" class="muted">추천 번호</h2>
      <div class="control-bar">
        <button type="button" id="drawButton">2게임 추천받기</button>
        <button type="button" id="themeToggle" class="theme-toggle">🌙 다크모드</button>
        <span class="muted" id="drawTime">아직 추첨 전입니다.</span>
      </div>

      <ul class="result-list" id="resultList">
        <li class="empty-state">추천받기 버튼을 눌러 번호를 생성하세요.</li>
      </ul>
    </section>
  </main>

  <script>
    const drawButton = document.querySelector("#drawButton");
    const drawTime = document.querySelector("#drawTime");
    const resultList = document.querySelector("#resultList");
    const themeToggle = document.querySelector("#themeToggle");

    function applyTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      themeToggle.textContent = theme === "dark" ? "☀️ 라이트모드" : "🌙 다크모드";
      localStorage.setItem("lotto-theme", theme);
    }

    const savedTheme =
      localStorage.getItem("lotto-theme") ||
      (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    applyTheme(savedTheme);

    themeToggle.addEventListener("click", () => {
      const nextTheme = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
      applyTheme(nextTheme);
    });

    function getBallClass(number) {
      if (number <= 10) return "ball-yellow";
      if (number <= 20) return "ball-blue";
      if (number <= 30) return "ball-red";
      if (number <= 40) return "ball-gray";
      return "ball-green";
    }

    function drawOneGame() {
      const pool = Array.from({ length: 45 }, (_, index) => index + 1);
      const picked = [];

      while (picked.length < 7) {
        const randomIndex = Math.floor(Math.random() * pool.length);
        const [number] = pool.splice(randomIndex, 1);
        picked.push(number);
      }

      return {
        main: picked.slice(0, 6).sort((a, b) => a - b),
        bonus: picked[6]
      };
    }

    function createBall(number) {
      const ball = document.createElement("span");
      ball.className = `ball ${getBallClass(number)}`;
      ball.textContent = number;
      return ball;
    }

    function renderGames() {
      const games = Array.from({ length: 2 }, drawOneGame);
      const fragment = document.createDocumentFragment();

      games.forEach((game, index) => {
        const item = document.createElement("li");
        item.className = "game-card";

        const title = document.createElement("strong");
        title.className = "game-title";
        title.textContent = `${index + 1}게임`;

        const numbers = document.createElement("div");
        numbers.className = "numbers";

        game.main.forEach((number) => {
          numbers.appendChild(createBall(number));
        });

        const plus = document.createElement("span");
        plus.className = "plus";
        plus.textContent = "+";
        numbers.appendChild(plus);

        const bonus = document.createElement("span");
        bonus.className = "bonus";

        const bonusLabel = document.createElement("span");
        bonusLabel.className = "bonus-label";
        bonusLabel.textContent = "보너스";

        bonus.appendChild(bonusLabel);
        bonus.appendChild(createBall(game.bonus));
        numbers.appendChild(bonus);

        item.appendChild(title);
        item.appendChild(numbers);
        fragment.appendChild(item);
      });

      resultList.replaceChildren(fragment);
      drawTime.textContent = `추첨 시각: ${new Date().toLocaleString("ko-KR")}`;
    }

    drawButton.addEventListener("click", renderGames);
  </script>
</body>
</html>
