<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또번호 추첨기</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, "Noto Sans KR", sans-serif;
      color: #172033;
      background:
        radial-gradient(circle at top left, rgba(255, 215, 87, 0.38), transparent 28rem),
        linear-gradient(135deg, #f7f9fc 0%, #eaf0f8 100%);
    }

    main {
      width: min(960px, calc(100% - 32px));
      margin: 0 auto;
      padding: 56px 0;
    }

    .app-header {
      display: grid;
      gap: 18px;
      margin-bottom: 34px;
    }

    h1 {
      font-size: clamp(2.25rem, 7vw, 4.8rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .sub-text {
      max-width: 620px;
      color: #59677c;
      font-size: 1.05rem;
      line-height: 1.7;
    }

    .control-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin: 30px 0 22px;
    }

    button {
      min-height: 48px;
      border: 0;
      border-radius: 8px;
      padding: 0 20px;
      font-size: 1rem;
      font-weight: 700;
      color: #111827;
      background: #ffd447;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(182, 129, 0, 0.18);
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    button:hover {
      background: #ffc928;
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(182, 129, 0, 0.22);
    }

    button:active {
      transform: translateY(0);
    }

    .muted {
      color: #6b7280;
      font-size: 0.95rem;
    }

    .result-list {
      display: grid;
      gap: 14px;
      list-style: none;
    }

    .game-card {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 18px;
      align-items: center;
      min-height: 98px;
      border: 1px solid rgba(120, 135, 160, 0.22);
      border-radius: 8px;
      padding: 18px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: 0 10px 28px rgba(28, 42, 70, 0.08);
    }

    .game-title {
      color: #2f3c52;
      font-weight: 800;
    }

    .numbers {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .ball {
      display: inline-grid;
      place-items: center;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      color: #111827;
      font-weight: 800;
      box-shadow: inset 0 -4px 10px rgba(0, 0, 0, 0.12), 0 5px 12px rgba(31, 41, 55, 0.14);
    }

    .ball-yellow {
      background: #f7c948;
    }

    .ball-blue {
      color: white;
      background: #3b82f6;
    }

    .ball-red {
      color: white;
      background: #ef4444;
    }

    .ball-gray {
      color: white;
      background: #64748b;
    }

    .ball-green {
      color: white;
      background: #22a06b;
    }

    .plus {
      color: #9aa4b2;
      font-weight: 800;
    }

    .bonus {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      margin-left: 2px;
    }

    .bonus-label {
      color: #6b7280;
      font-size: 0.85rem;
      font-weight: 700;
    }

    .empty-state {
      border: 1px dashed #aeb8c8;
      border-radius: 8px;
      padding: 36px 20px;
      color: #68758a;
      background: rgba(255, 255, 255, 0.58);
      text-align: center;
    }

    @media (max-width: 640px) {
      main {
        width: min(100% - 24px, 960px);
        padding: 34px 0;
      }

      .game-card {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .ball {
        width: 40px;
        height: 40px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header class="app-header">
      <h1>로또번호 추첨기</h1>
      <p class="sub-text">
        버튼을 누르면 1부터 45까지의 숫자 중 중복 없이 6개 번호를 뽑습니다.
        한 번에 5게임까지 추천하고, 각 게임마다 보너스 번호도 함께 표시합니다.
      </p>
    </header>

    <section aria-labelledby="draw-title">
      <h2 id="draw-title" class="muted">추천 번호</h2>
      <div class="control-bar">
        <button type="button" id="drawButton">5게임 추천받기</button>
        <span class="muted" id="drawTime">아직 추첨 전입니다.</span>
      </div>

      <ul class="result-list" id="resultList">
        <li class="empty-state">추천받기 버튼을 눌러 번호를 생성하세요.</li>
      </ul>
    </section>
  </main>

  <script>
    const drawButton = document.querySelector("#drawButton");
    const drawTime = document.querySelector("#drawTime");
    const resultList = document.querySelector("#resultList");

    function getBallClass(number) {
      if (number <= 10) return "ball-yellow";
      if (number <= 20) return "ball-blue";
      if (number <= 30) return "ball-red";
      if (number <= 40) return "ball-gray";
      return "ball-green";
    }

    function drawOneGame() {
      const pool = Array.from({ length: 45 }, (_, index) => index + 1);
      const picked = [];

      while (picked.length < 7) {
        const randomIndex = Math.floor(Math.random() * pool.length);
        const [number] = pool.splice(randomIndex, 1);
        picked.push(number);
      }

      return {
        main: picked.slice(0, 6).sort((a, b) => a - b),
        bonus: picked[6]
      };
    }

    function createBall(number) {
      const ball = document.createElement("span");
      ball.className = `ball ${getBallClass(number)}`;
      ball.textContent = number;
      return ball;
    }

    function renderGames() {
      const games = Array.from({ length: 5 }, drawOneGame);
      const fragment = document.createDocumentFragment();

      games.forEach((game, index) => {
        const item = document.createElement("li");
        item.className = "game-card";

        const title = document.createElement("strong");
        title.className = "game-title";
        title.textContent = `${index + 1}게임`;

        const numbers = document.createElement("div");
        numbers.className = "numbers";

        game.main.forEach((number) => {
          numbers.appendChild(createBall(number));
        });

        const plus = document.createElement("span");
        plus.className = "plus";
        plus.textContent = "+";
        numbers.appendChild(plus);

        const bonus = document.createElement("span");
        bonus.className = "bonus";

        const bonusLabel = document.createElement("span");
        bonusLabel.className = "bonus-label";
        bonusLabel.textContent = "보너스";

        bonus.appendChild(bonusLabel);
        bonus.appendChild(createBall(game.bonus));
        numbers.appendChild(bonus);

        item.appendChild(title);
        item.appendChild(numbers);
        fragment.appendChild(item);
      });

      resultList.replaceChildren(fragment);
      drawTime.textContent = `추첨 시각: ${new Date().toLocaleString("ko-KR")}`;
    }

    drawButton.addEventListener("click", renderGames);
  </script>
</body>
</html>
