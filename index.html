<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘 뭐 먹지? 메뉴 추천기</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --text-color: #172033;
      --sub-text-color: #59677c;
      --muted-color: #6b7280;
      --bg-glow: rgba(255, 159, 67, 0.32);
      --bg-grad-start: #f7f9fc;
      --bg-grad-end: #eaf0f8;
      --button-bg: #ff9f43;
      --button-bg-hover: #ff8c1a;
      --button-text: #1f2937;
      --card-bg: rgba(255, 255, 255, 0.86);
      --card-border: rgba(120, 135, 160, 0.22);
      --card-shadow: rgba(28, 42, 70, 0.08);
      --title-color: #2f3c52;
      --empty-border: #aeb8c8;
      --empty-bg: rgba(255, 255, 255, 0.58);
      --empty-text: #68758a;
      --input-bg: rgba(0, 0, 0, 0.02);
    }

    html[data-theme="dark"] {
      --text-color: #e8edf7;
      --sub-text-color: #aab4c6;
      --muted-color: #9aa4b8;
      --bg-glow: rgba(255, 159, 67, 0.16);
      --bg-grad-start: #161b27;
      --bg-grad-end: #0c1018;
      --button-bg: #ff9f43;
      --button-bg-hover: #ff8c1a;
      --button-text: #1f2937;
      --card-bg: rgba(255, 255, 255, 0.06);
      --card-border: rgba(255, 255, 255, 0.12);
      --card-shadow: rgba(0, 0, 0, 0.35);
      --title-color: #e8edf7;
      --empty-border: rgba(255, 255, 255, 0.25);
      --empty-bg: rgba(255, 255, 255, 0.04);
      --empty-text: #9aa4b8;
      --input-bg: rgba(255, 255, 255, 0.06);
    }

    body {
      min-height: 100vh;
      font-family: Arial, "Noto Sans KR", sans-serif;
      color: var(--text-color);
      background:
        radial-gradient(circle at top left, var(--bg-glow), transparent 28rem),
        linear-gradient(135deg, var(--bg-grad-start) 0%, var(--bg-grad-end) 100%);
      transition: background 0.2s ease, color 0.2s ease;
    }

    main {
      width: min(720px, calc(100% - 32px));
      margin: 0 auto;
      padding: 56px 0;
    }

    .app-header {
      display: grid;
      gap: 18px;
      margin-bottom: 34px;
    }

    h1 {
      font-size: clamp(2rem, 7vw, 3.4rem);
      line-height: 1.1;
    }

    .sub-text {
      max-width: 620px;
      color: var(--sub-text-color);
      font-size: 1.05rem;
      line-height: 1.7;
    }

    .control-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin: 0 0 22px;
    }

    button {
      min-height: 48px;
      border: 0;
      border-radius: 8px;
      padding: 0 20px;
      font-size: 1rem;
      font-weight: 700;
      color: var(--button-text);
      background: var(--button-bg);
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(182, 95, 0, 0.18);
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    button:hover {
      background: var(--button-bg-hover);
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(182, 95, 0, 0.22);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .theme-toggle {
      background: transparent;
      color: var(--text-color);
      border: 1px solid var(--card-border);
      box-shadow: none;
    }

    .theme-toggle:hover {
      background: var(--card-bg);
      box-shadow: none;
    }

    .muted {
      color: var(--muted-color);
      font-size: 0.95rem;
    }

    .menu-card {
      display: grid;
      gap: 10px;
      justify-items: center;
      text-align: center;
      min-height: 320px;
      align-content: center;
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 32px 18px;
      background: var(--card-bg);
      box-shadow: 0 10px 28px var(--card-shadow);
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .menu-photo {
      display: grid;
      justify-content: center;
    }

    .menu-emoji {
      font-size: 5rem;
      line-height: 1;
    }

    .menu-photo-img {
      width: 100%;
      max-width: 320px;
      height: 220px;
      object-fit: cover;
      border-radius: 12px;
      box-shadow: 0 10px 24px var(--card-shadow);
    }

    .menu-name {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--title-color);
    }

    .menu-desc {
      color: var(--sub-text-color);
      font-size: 1rem;
    }

    .empty-state {
      border: 1px dashed var(--empty-border);
      border-radius: 12px;
      color: var(--empty-text);
      background: var(--empty-bg);
    }

    .order-section {
      margin-top: 40px;
    }

    .order-section h2 {
      margin-bottom: 14px;
      font-size: 1.3rem;
      color: var(--title-color);
    }

    #orderForm {
      display: grid;
      gap: 16px;
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 24px;
      background: var(--card-bg);
      box-shadow: 0 10px 28px var(--card-shadow);
    }

    #orderForm label {
      display: grid;
      gap: 6px;
      font-size: 0.95rem;
    }

    #orderForm input[type="text"],
    #orderForm input[type="number"],
    #orderForm input[type="date"] {
      min-height: 44px;
      border: 1px solid var(--card-border);
      border-radius: 6px;
      padding: 0 12px;
      background: var(--input-bg);
      color: var(--text-color);
      font-size: 1rem;
    }

    #orderForm input[readonly] {
      color: var(--muted-color);
    }

    .order-fieldset {
      border: 1px solid var(--card-border);
      border-radius: 6px;
      padding: 12px;
      display: flex;
      gap: 18px;
    }

    .order-fieldset legend {
      font-size: 0.85rem;
      color: var(--muted-color);
      padding: 0 4px;
    }

    .order-fieldset label {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 6px;
      font-size: 0.95rem;
    }

    #orderStatus {
      min-height: 1.2em;
    }

    @media (max-width: 640px) {
      main {
        width: min(100% - 24px, 720px);
        padding: 34px 0;
      }
    }
  </style>
</head>
<body>
  <main>
    <header class="app-header">
      <h1>오늘 뭐 먹지?</h1>
      <p class="sub-text">
        버튼을 누르면 메뉴 목록 중 하나를 무작위로 추천해 드려요.
        마음에 드는 메뉴가 나오면 아래 폼에 이름과 수량을 적어 신청해보세요.
      </p>
    </header>

    <section aria-labelledby="recommend-title">
      <h2 id="recommend-title" class="muted" style="margin-bottom: 14px;">메뉴 추천</h2>
      <div class="control-bar">
        <button type="button" id="recommendButton">메뉴 추천받기</button>
        <button type="button" id="themeToggle" class="theme-toggle">🌙 다크모드</button>
      </div>

      <div class="menu-card empty-state" id="menuResult">추천받기 버튼을 눌러 메뉴를 확인하세요.</div>
    </section>

    <section class="order-section" aria-labelledby="order-title">
      <h2 id="order-title">메뉴 신청하기</h2>
      <form id="orderForm">
        <label>
          추천 메뉴
          <input type="text" name="menu" id="orderMenu" readonly placeholder="먼저 메뉴를 추천받아 주세요" />
        </label>
        <label>
          이름
          <input type="text" name="name" required />
        </label>
        <label>
          날짜
          <input type="date" name="date" id="orderDate" required />
        </label>
        <fieldset class="order-fieldset">
          <legend>식사 시간</legend>
          <label><input type="radio" name="meal_time" value="아침" /> 아침</label>
          <label><input type="radio" name="meal_time" value="점심" checked /> 점심</label>
          <label><input type="radio" name="meal_time" value="저녁" /> 저녁</label>
        </fieldset>
        <label>
          수량(인분)
          <input type="number" name="count" id="orderCount" min="1" value="1" />
        </label>
        <input type="hidden" name="submitted_at" id="orderSubmittedAt" />
        <div class="control-bar" style="margin: 0;">
          <button type="submit" id="orderSubmit">제출</button>
        </div>
        <p id="orderStatus" class="muted" role="status"></p>
      </form>
    </section>
  </main>

  <script>
    const themeToggle = document.querySelector("#themeToggle");

    function applyTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      themeToggle.textContent = theme === "dark" ? "☀️ 라이트모드" : "🌙 다크모드";
      localStorage.setItem("menu-theme", theme);
    }

    const savedTheme =
      localStorage.getItem("menu-theme") ||
      (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    applyTheme(savedTheme);

    themeToggle.addEventListener("click", () => {
      const nextTheme = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
      applyTheme(nextTheme);
    });

    const MENUS = [
      { name: "김치찌개", wiki: "Kimchi-jjigae", emoji: "🍲", desc: "든든하고 칼칼한 한식 한 끼" },
      { name: "된장찌개", wiki: "Doenjang-jjigae", emoji: "🥘", desc: "구수하고 편안한 집밥 느낌" },
      { name: "짜장면", wiki: "Jjajangmyeon", emoji: "🍜", desc: "한 그릇으로 든든한 중식" },
      { name: "짬뽕", wiki: "Jjamppong", emoji: "🦑", desc: "매콤하고 시원한 국물 한 그릇" },
      { name: "떡볶이", wiki: "Tteokbokki", emoji: "🌶️", desc: "매콤달콤한 분식의 대표주자" },
      { name: "김밥", wiki: "Kimbap", emoji: "🍙", desc: "가볍고 든든한 한 끼" },
      { name: "초밥", wiki: "Sushi", emoji: "🍣", desc: "신선하고 깔끔한 한 입" },
      { name: "라멘", wiki: "Ramen", emoji: "🍜", desc: "진한 국물의 일본식 라면" },
      { name: "피자", wiki: "Pizza", emoji: "🍕", desc: "치즈 가득한 한 조각의 행복" },
      { name: "햄버거", wiki: "Hamburger", emoji: "🍔", desc: "빠르고 든든한 패스트푸드" },
      { name: "양념치킨", wiki: "Korean_fried_chicken", emoji: "🍗", desc: "바삭바삭, 언제나 옳은 선택" },
      { name: "삼겹살", wiki: "Samgyeopsal", emoji: "🥓", desc: "구워 먹는 즐거움, 회식 필수" },
      { name: "비빔밥", wiki: "Bibimbap", emoji: "🍱", desc: "골고루 영양 가득한 한 그릇" },
      { name: "우동", wiki: "Udon", emoji: "🍲", desc: "따뜻한 국물이 생각날 때" },
      { name: "파스타", wiki: "Pasta", emoji: "🍝", desc: "부드럽고 풍미 가득한 한 끼" },
      { name: "샐러드", wiki: "Salad", emoji: "🥗", desc: "가볍고 건강하게 즐기는 한 끼" },
      { name: "칼국수", wiki: "Kalguksu", emoji: "🍜", desc: "쫄깃한 면발과 시원한 국물" },
      { name: "갈비탕", wiki: "Galbitang", emoji: "🍖", desc: "든든하고 깊은 맛의 보양식" },
      { name: "마라탕", wiki: "Malatang", emoji: "🌶️", desc: "얼큰하고 중독적인 매운맛" },
      { name: "돈까스", wiki: "Tonkatsu", emoji: "🍱", desc: "바삭한 튀김옷의 행복" },
      { name: "불고기", wiki: "Bulgogi", emoji: "🥩", desc: "달콤짭짤한 한국식 구이" },
      { name: "잡채", wiki: "Japchae", emoji: "🍝", desc: "쫄깃한 당면과 채소의 조화" },
      { name: "순두부찌개", wiki: "Sundubu-jjigae", emoji: "🍲", desc: "부드럽고 얼큰한 순두부 한 그릇" },
      { name: "냉면", wiki: "Naengmyeon", emoji: "🍜", desc: "시원하게 즐기는 여름 별미" },
      { name: "보쌈", wiki: "Bossam", emoji: "🥩", desc: "촉촉한 수육과 아삭한 김치" },
      { name: "족발", wiki: "Jokbal", emoji: "🍖", desc: "쫄깃한 콜라겐 가득 별미" },
      { name: "부대찌개", wiki: "Budae-jjigae", emoji: "🍲", desc: "얼큰하고 든든한 한 끼" },
      { name: "해물파전", wiki: "Haemul_pajeon", emoji: "🥞", desc: "바삭하고 고소한 전 한 장" },
      { name: "떡국", wiki: "Tteokguk", emoji: "🍲", desc: "깔끔한 국물의 떡국 한 그릇" },
      { name: "갈비찜", wiki: "Galbijjim", emoji: "🍖", desc: "달콤하게 졸인 갈비찜" },
      { name: "닭갈비", wiki: "Dak-galbi", emoji: "🍗", desc: "매콤하게 볶아낸 닭갈비" },
      { name: "찜닭", wiki: "Jjimdak", emoji: "🍗", desc: "달콤짭짤한 찜닭 한 그릇" },
      { name: "콩나물국밥", wiki: "Gukbap", emoji: "🍚", desc: "해장에 좋은 시원한 국밥" },
      { name: "순대", wiki: "Sundae_(Korean_food)", emoji: "🌭", desc: "쫄깃한 분식의 단골 메뉴" },
      { name: "곰탕", wiki: "Gomtang", emoji: "🍲", desc: "깊고 진한 사골 국물" },
      { name: "추어탕", wiki: "Chueotang", emoji: "🐟", desc: "보양식으로 유명한 추어탕" },
      { name: "닭볶음탕", wiki: "Dakbokkeumtang", emoji: "🍗", desc: "매콤하게 졸인 닭찜 요리" },
      { name: "감자탕", wiki: "Gamjatang", emoji: "🍖", desc: "얼큰하고 든든한 감자탕" },
      { name: "부침개", wiki: "Buchimgae", emoji: "🥞", desc: "비 오는 날 생각나는 전" },
      { name: "떡갈비", wiki: "Tteok-galbi", emoji: "🍖", desc: "부드럽고 달콤한 떡갈비" },
      { name: "쌀국수", wiki: "Pho", emoji: "🍜", desc: "깔끔한 베트남식 쌀국수" },
      { name: "팟타이", wiki: "Pad_thai", emoji: "🍜", desc: "새콤달콤한 태국식 볶음면" },
      { name: "카레", wiki: "Curry", emoji: "🍛", desc: "향긋하고 든든한 카레 한 그릇" },
      { name: "스테이크", wiki: "Steak", emoji: "🥩", desc: "육즙 가득한 특별한 한 끼" },
      { name: "그라탕", wiki: "Gratin", emoji: "🧀", desc: "치즈 듬뿍 오븐 요리" },
      { name: "리조또", wiki: "Risotto", emoji: "🍚", desc: "크리미하고 부드러운 이탈리안 라이스" },
      { name: "타코", wiki: "Taco", emoji: "🌮", desc: "한 입에 즐기는 멕시칸 요리" },
      { name: "케밥", wiki: "Kebab", emoji: "🥙", desc: "고기와 채소가 가득한 한 끼" },
      { name: "핫도그", wiki: "Hot_dog", emoji: "🌭", desc: "간단하고 든든한 길거리 음식" },
      { name: "도넛", wiki: "Doughnut", emoji: "🍩", desc: "달콤한 디저트 한 입" }
    ];

    const recommendButton = document.querySelector("#recommendButton");
    const menuResult = document.querySelector("#menuResult");
    const orderMenu = document.querySelector("#orderMenu");
    const orderDate = document.querySelector("#orderDate");

    function todayISODate() {
      const now = new Date();
      const localTime = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
      return localTime.toISOString().slice(0, 10);
    }

    orderDate.value = todayISODate();

    async function recommendMenu() {
      recommendButton.disabled = true;

      const menu = MENUS[Math.floor(Math.random() * MENUS.length)];

      menuResult.classList.remove("empty-state");
      menuResult.replaceChildren();

      const photo = document.createElement("div");
      photo.className = "menu-photo";
      const emoji = document.createElement("div");
      emoji.className = "menu-emoji";
      emoji.textContent = menu.emoji;
      photo.appendChild(emoji);

      const name = document.createElement("div");
      name.className = "menu-name";
      name.textContent = menu.name;

      const desc = document.createElement("div");
      desc.className = "menu-desc";
      desc.textContent = menu.desc;

      menuResult.appendChild(photo);
      menuResult.appendChild(name);
      menuResult.appendChild(desc);

      orderMenu.value = menu.name;

      try {
        const response = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${menu.wiki}`);
        if (response.ok) {
          const data = await response.json();
          const imageUrl = data.thumbnail && data.thumbnail.source;
          if (imageUrl) {
            const img = document.createElement("img");
            img.src = imageUrl;
            img.alt = menu.name;
            img.className = "menu-photo-img";
            photo.replaceChildren(img);
          }
        }
      } catch (error) {
        // 네트워크 오류 시 이모지 표시를 그대로 유지
      } finally {
        recommendButton.disabled = false;
      }
    }

    recommendButton.addEventListener("click", recommendMenu);

    const FORMSPREE_ENDPOINT = "https://formspree.io/f/mpqgaddv";
    const orderForm = document.querySelector("#orderForm");
    const orderStatus = document.querySelector("#orderStatus");
    const orderSubmit = document.querySelector("#orderSubmit");

    orderForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      if (!orderMenu.value) {
        orderStatus.textContent = "먼저 메뉴를 추천받아 주세요.";
        return;
      }

      orderSubmit.disabled = true;
      orderStatus.textContent = "전송 중...";
      document.querySelector("#orderSubmittedAt").value = new Date().toLocaleString("ko-KR");

      try {
        const response = await fetch(FORMSPREE_ENDPOINT, {
          method: "POST",
          headers: { Accept: "application/json" },
          body: new FormData(orderForm)
        });

        if (response.ok) {
          orderStatus.textContent = "제출이 완료되었습니다. 감사합니다!";
          orderForm.reset();
          orderDate.value = todayISODate();
          menuResult.classList.add("empty-state");
          menuResult.textContent = "추천받기 버튼을 눌러 메뉴를 확인하세요.";
        } else {
          orderStatus.textContent = "제출에 실패했습니다. 다시 시도해 주세요.";
        }
      } catch (error) {
        orderStatus.textContent = "네트워크 오류로 제출에 실패했습니다.";
      } finally {
        orderSubmit.disabled = false;
      }
    });
  </script>
</body>
</html>
