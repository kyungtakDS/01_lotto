<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나는 강아지상? 고양이상? 동물상 테스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --text-color: #172033;
      --sub-text-color: #59677c;
      --muted-color: #6b7280;
      --bg-glow: rgba(255, 159, 67, 0.32);
      --bg-grad-start: #f7f9fc;
      --bg-grad-end: #eaf0f8;
      --button-bg: #ff9f43;
      --button-bg-hover: #ff8c1a;
      --button-text: #1f2937;
      --card-bg: rgba(255, 255, 255, 0.86);
      --card-border: rgba(120, 135, 160, 0.22);
      --card-shadow: rgba(28, 42, 70, 0.08);
      --title-color: #2f3c52;
      --empty-border: #aeb8c8;
      --empty-bg: rgba(255, 255, 255, 0.58);
      --empty-text: #68758a;
      --input-bg: rgba(0, 0, 0, 0.02);
      --bar-track: rgba(0, 0, 0, 0.06);
      --dog-color: #ff9f43;
      --cat-color: #7c83fd;
    }

    html[data-theme="dark"] {
      --text-color: #e8edf7;
      --sub-text-color: #aab4c6;
      --muted-color: #9aa4b8;
      --bg-glow: rgba(255, 159, 67, 0.16);
      --bg-grad-start: #161b27;
      --bg-grad-end: #0c1018;
      --button-bg: #ff9f43;
      --button-bg-hover: #ff8c1a;
      --button-text: #1f2937;
      --card-bg: rgba(255, 255, 255, 0.06);
      --card-border: rgba(255, 255, 255, 0.12);
      --card-shadow: rgba(0, 0, 0, 0.35);
      --title-color: #e8edf7;
      --empty-border: rgba(255, 255, 255, 0.25);
      --empty-bg: rgba(255, 255, 255, 0.04);
      --empty-text: #9aa4b8;
      --input-bg: rgba(255, 255, 255, 0.06);
      --bar-track: rgba(255, 255, 255, 0.08);
    }

    body {
      min-height: 100vh;
      font-family: Arial, "Noto Sans KR", sans-serif;
      color: var(--text-color);
      background:
        radial-gradient(circle at top left, var(--bg-glow), transparent 28rem),
        linear-gradient(135deg, var(--bg-grad-start) 0%, var(--bg-grad-end) 100%);
      transition: background 0.2s ease, color 0.2s ease;
    }

    main {
      width: min(720px, calc(100% - 32px));
      margin: 0 auto;
      padding: 56px 0;
    }

    .app-header {
      display: grid;
      gap: 18px;
      margin-bottom: 34px;
    }

    h1 {
      font-size: clamp(2rem, 7vw, 3.4rem);
      line-height: 1.1;
    }

    .sub-text {
      max-width: 620px;
      color: var(--sub-text-color);
      font-size: 1.05rem;
      line-height: 1.7;
    }

    .control-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin: 0 0 22px;
    }

    button {
      min-height: 48px;
      border: 0;
      border-radius: 8px;
      padding: 0 20px;
      font-size: 1rem;
      font-weight: 700;
      color: var(--button-text);
      background: var(--button-bg);
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(182, 95, 0, 0.18);
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    button:hover {
      background: var(--button-bg-hover);
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(182, 95, 0, 0.22);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .theme-toggle {
      background: transparent;
      color: var(--text-color);
      border: 1px solid var(--card-border);
      box-shadow: none;
    }

    .theme-toggle:hover {
      background: var(--card-bg);
      box-shadow: none;
    }

    .muted {
      color: var(--muted-color);
      font-size: 0.95rem;
    }

    .test-card {
      display: grid;
      gap: 22px;
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 28px 22px;
      background: var(--card-bg);
      box-shadow: 0 10px 28px var(--card-shadow);
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .upload-area {
      display: grid;
      justify-content: center;
      border-radius: 12px;
      transition: box-shadow 0.16s ease;
    }

    .upload-area.drag-over {
      box-shadow: 0 0 0 3px var(--button-bg);
    }

    .upload-area.drag-over .empty-state {
      border-color: var(--button-bg);
    }

    #preview-container {
      display: grid;
      justify-content: center;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 24px var(--card-shadow);
    }

    #preview-container[hidden],
    .bars[hidden] {
      display: none;
    }

    #previewImage {
      display: block;
      width: 260px;
      height: 260px;
      object-fit: cover;
    }

    .empty-state {
      border: 1px dashed var(--empty-border);
      border-radius: 12px;
      color: var(--empty-text);
      background: var(--empty-bg);
      min-height: 200px;
      width: 200px;
      display: grid;
      align-content: center;
      justify-content: center;
      text-align: center;
      padding: 16px;
    }

    .result-area {
      display: grid;
      gap: 16px;
    }

    .verdict {
      display: grid;
      justify-items: center;
      gap: 6px;
      text-align: center;
    }

    .verdict-emoji {
      font-size: 4rem;
      line-height: 1;
    }

    .verdict-label {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--title-color);
    }

    .verdict-desc {
      color: var(--sub-text-color);
      font-size: 1rem;
      max-width: 460px;
    }

    .bars {
      display: grid;
      gap: 12px;
    }

    .bar-row {
      display: grid;
      gap: 6px;
    }

    .bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.95rem;
      color: var(--sub-text-color);
    }

    .bar-track {
      height: 12px;
      border-radius: 999px;
      background: var(--bar-track);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
      width: 0%;
      transition: width 0.25s ease;
    }

    .bar-fill.dog {
      background: var(--dog-color);
    }

    .bar-fill.cat {
      background: var(--cat-color);
    }

    .comments-section {
      margin-top: 40px;
    }

    .comments-section h2 {
      margin-bottom: 14px;
      font-size: 1.3rem;
      color: var(--title-color);
    }

    @media (max-width: 640px) {
      main {
        width: min(100% - 24px, 720px);
        padding: 34px 0;
      }
    }
  </style>
</head>
<body>
  <main>
    <header class="app-header">
      <h1>나는 강아지상? 고양이상?</h1>
      <p class="sub-text">
        얼굴 사진을 올리거나 끌어다 놓아보세요. 직접 학습시킨 AI 모델이 강아지상인지 고양이상인지 분석해 드려요.
      </p>
    </header>

    <section aria-labelledby="test-title">
      <h2 id="test-title" class="muted" style="margin-bottom: 14px;">동물상 테스트</h2>
      <div class="control-bar">
        <button type="button" id="uploadButton">사진 선택하기</button>
        <button type="button" id="themeToggle" class="theme-toggle">🌙 다크모드</button>
      </div>
      <input type="file" id="photoInput" accept="image/*" hidden />

      <div class="test-card">
        <div class="upload-area" id="dropZone">
          <div id="preview-container" hidden>
            <img id="previewImage" alt="업로드한 사진" />
          </div>
          <div class="empty-state" id="uploadEmpty">사진을 선택하거나<br />이 영역으로 끌어다 놓아 주세요.</div>
        </div>

        <div class="result-area">
          <div class="verdict empty-state" id="verdict" style="width: auto;">
            사진을 올리면 분석 결과가 여기에 표시돼요.
          </div>

          <div class="bars" id="bars" hidden>
            <div class="bar-row">
              <div class="bar-label">
                <span>🐶 강아지상</span>
                <span id="dogPercent">0%</span>
              </div>
              <div class="bar-track">
                <div class="bar-fill dog" id="dogBar"></div>
              </div>
            </div>
            <div class="bar-row">
              <div class="bar-label">
                <span>🐱 고양이상</span>
                <span id="catPercent">0%</span>
              </div>
              <div class="bar-track">
                <div class="bar-fill cat" id="catBar"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="comments-section" aria-labelledby="comments-title">
      <h2 id="comments-title">댓글</h2>
      <div id="disqus_thread"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <script>
    const themeToggle = document.querySelector("#themeToggle");

    function applyTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      themeToggle.textContent = theme === "dark" ? "☀️ 라이트모드" : "🌙 다크모드";
      localStorage.setItem("animal-test-theme", theme);
    }

    const savedTheme =
      localStorage.getItem("animal-test-theme") ||
      (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    applyTheme(savedTheme);

    themeToggle.addEventListener("click", () => {
      const nextTheme = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
      applyTheme(nextTheme);
    });

    const MODEL_URL = "https://teachablemachine.withgoogle.com/models/l2mrBkce1/";

    const ANIMAL_INFO = {
      dog: { label: "강아지상", emoji: "🐶", desc: "둥글둥글 친근하고 활발한 매력이 느껴지는 강아지상이에요." },
      cat: { label: "고양이상", emoji: "🐱", desc: "도시적이고 시크한 매력이 느껴지는 고양이상이에요." }
    };

    let model, maxPredictions;

    const uploadButton = document.querySelector("#uploadButton");
    const photoInput = document.querySelector("#photoInput");
    const dropZone = document.querySelector("#dropZone");
    const uploadEmpty = document.querySelector("#uploadEmpty");
    const previewContainer = document.querySelector("#preview-container");
    const previewImage = document.querySelector("#previewImage");
    const verdict = document.querySelector("#verdict");
    const bars = document.querySelector("#bars");
    const dogBar = document.querySelector("#dogBar");
    const catBar = document.querySelector("#catBar");
    const dogPercent = document.querySelector("#dogPercent");
    const catPercent = document.querySelector("#catPercent");

    async function loadModel() {
      if (model) return model;
      const modelURL = MODEL_URL + "model.json";
      const metadataURL = MODEL_URL + "metadata.json";
      model = await tmImage.load(modelURL, metadataURL);
      maxPredictions = model.getTotalClasses();
      return model;
    }

    async function handleFile(file) {
      if (!file || !file.type.startsWith("image/")) return;

      uploadButton.disabled = true;
      uploadButton.textContent = "분석 중...";
      verdict.classList.add("empty-state");
      verdict.textContent = "분석 중...";
      bars.hidden = true;

      try {
        await loadModel();

        const objectUrl = URL.createObjectURL(file);
        previewImage.src = objectUrl;
        await previewImage.decode();

        uploadEmpty.hidden = true;
        previewContainer.hidden = false;

        await predict();
      } catch (error) {
        verdict.textContent = "사진을 분석할 수 없어요. 다른 사진으로 다시 시도해 주세요.";
      } finally {
        uploadButton.disabled = false;
        uploadButton.textContent = "다른 사진 선택하기";
        photoInput.value = "";
      }
    }

    uploadButton.addEventListener("click", () => photoInput.click());

    photoInput.addEventListener("change", () => {
      handleFile(photoInput.files[0]);
    });

    ["dragenter", "dragover"].forEach((eventName) => {
      dropZone.addEventListener(eventName, (event) => {
        event.preventDefault();
        dropZone.classList.add("drag-over");
      });
    });

    ["dragleave", "dragend"].forEach((eventName) => {
      dropZone.addEventListener(eventName, (event) => {
        event.preventDefault();
        dropZone.classList.remove("drag-over");
      });
    });

    dropZone.addEventListener("drop", (event) => {
      event.preventDefault();
      dropZone.classList.remove("drag-over");
      const file = event.dataTransfer.files && event.dataTransfer.files[0];
      handleFile(file);
    });

    async function predict() {
      const prediction = await model.predict(previewImage);
      const scores = {};
      for (let i = 0; i < maxPredictions; i++) {
        scores[prediction[i].className] = prediction[i].probability;
      }

      const dogScore = scores.dog || 0;
      const catScore = scores.cat || 0;

      const dogPct = Math.round(dogScore * 100);
      const catPct = Math.round(catScore * 100);

      dogBar.style.width = dogPct + "%";
      catBar.style.width = catPct + "%";
      dogPercent.textContent = dogPct + "%";
      catPercent.textContent = catPct + "%";

      const topKey = dogScore >= catScore ? "dog" : "cat";
      const topInfo = ANIMAL_INFO[topKey];
      const topPct = Math.max(dogPct, catPct);

      bars.hidden = false;
      verdict.classList.remove("empty-state");
      verdict.innerHTML = "";
      const emojiEl = document.createElement("div");
      emojiEl.className = "verdict-emoji";
      emojiEl.textContent = topInfo.emoji;

      const labelEl = document.createElement("div");
      labelEl.className = "verdict-label";
      labelEl.textContent = `${topInfo.label} (${topPct}%)`;

      const descEl = document.createElement("div");
      descEl.className = "verdict-desc";
      descEl.textContent = topInfo.desc;

      verdict.appendChild(emojiEl);
      verdict.appendChild(labelEl);
      verdict.appendChild(descEl);
    }

    (function () {
      const d = document, s = d.createElement("script");
      s.src = "https://hydrods.disqus.com/embed.js";
      s.setAttribute("data-timestamp", +new Date());
      (d.head || d.body).appendChild(s);
    })();
  </script>
  <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
</body>
</html>
